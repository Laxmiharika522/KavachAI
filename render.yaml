services:
  - type: web
    name: kavachai-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: GEMINI_API_KEY
        sync: false
      - key: SAFE_BROWSING_API_KEY
        sync: false
